<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Teflow">
  <title>Teflow</title>
  <!-- Ground: the Console "void" -->
  <rect width="512" height="512" rx="112" fill="#0b0e12"/>
  <!-- Subtle inner frame for depth -->
  <rect x="22" y="22" width="468" height="468" rx="90" fill="none" stroke="#232830" stroke-width="8"/>
  <!-- Monospace "T" in paper -->
  <g fill="#e8e6df">
    <rect x="140" y="150" width="170" height="38" rx="3"/>
    <rect x="206" y="150" width="38" height="150" rx="3"/>
  </g>
  <!-- Amber prompt baseline + blinking block caret (the brand signature) -->
  <rect x="140" y="330" width="170" height="16" rx="8" fill="#e8a33d"/>
  <rect x="326" y="304" width="46" height="42" rx="3" fill="#e8a33d"/>
</svg>
